name: Poke lineage-cache rebuild

on:
  push:
    paths:
      - 'dao_members.json'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build-cv-cache on lineage-credentials
        env:
          GH_TOKEN: ${{ secrets.LINEAGE_DISPATCH_PAT }}
        run: |
          gh workflow run build-cv-cache.yml \
            --repo TrueSightDAO/lineage-credentials \
            --ref main
